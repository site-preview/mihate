<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIHATE ACADEMY｜プロを目指す名古屋のボーカルスクール</title>
    
    <!-- ここを追加：検索エンジンに登録されるのを防ぐ記述 -->
    <meta name="robots" content="noindex, nofollow">

    <style>
        /* 全体のリセットと共通スタイル */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }

        a {
            color: #ffffff;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        a:hover {
            opacity: 0.7;
        }

        /* ヘッダー */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
        }

        .logo {
            /* font-size: 24px; */
            /* font-weight: 900; */
            /* letter-spacing: 2px; */
            display: flex; /* To allow vertical alignment of image */
            align-items: center; /* Vertically align image within anchor */
        }

        .logo-img {
            height: 40px; /* Adjust as needed */
            width: auto; /* Maintain aspect ratio */
            object-fit: contain;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav ul li a {
            font-size: 14px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* ヒーローセクション（メインビジュアル） */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?q=80&w=2070') no-repeat center center/cover;
            /* ↑現在はダミー画像です。ここを動画（videoタグ）に変えると1MILLION風になります */
        }

        .hero-title {
            font-size: 80px;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .hero-subtitle {
            font-size: 18px;
            letter-spacing: 4px;
            margin-bottom: 40px;
            color: #cccccc;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            border: 2px solid #ffffff;
            background: transparent;
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .btn:hover {
            background-color: #ffffff;
            color: #000000;
            opacity: 1;
        }

        /* コンテンツ共通 */
        .section {
            padding: 100px 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 36px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 50px;
            letter-spacing: 1px;
            border-left: 5px solid #ffffff;
            padding-left: 15px;
        }

        /* グリッドセクション（クラス・ダンサー紹介用） */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .grid-item {
            position: relative;
            overflow: hidden;
            background-color: #111111;
            aspect-ratio: 3 / 4;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            border: 1px solid #222222;
            transition: border-color 0.3s;
        }

        .grid-item:hover {
            border-color: #ffffff;
        }

        .grid-item-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            z-index: 1;
            transition: transform 0.5s, opacity 0.5s;
        }

        .grid-item:hover .grid-item-img {
            transform: scale(1.05);
            opacity: 0.8;
        }

        .grid-item-content {
            position: relative;
            z-index: 2;
        }

        .grid-item-tag {
            font-size: 12px;
            text-transform: uppercase;
            background-color: #ffffff;
            color: #000000;
            padding: 3px 8px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 10px;
        }

        .grid-item-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 50px;
        }

        /* フッター */
        footer {
            background-color: #111111;
            padding: 50px;
            text-align: center;
            font-size: 12px;
            color: #666666;
            border-top: 1px solid #222222;
        }

        /* レスポンシブ（スマホ対応） */
        @media (max-width: 768px) {
            header { padding: 20px; }
            nav { display: none; } /* スマホ時は簡易化のためメニュー非表示 */
            .hero-title { font-size: 40px; }
            .section { padding: 60px 20px; }
        }
    </style>
</head>
<body>

    <!-- ヘッダーエリア -->
    <header>
        <a href="#" class="logo">
            <img src="logo.png" alt="STUDIO X Logo" class="logo-img">
        </a>
        <nav>
            <ul>
                <li><a href="#">About</a></li>
                <li><a href="#">Instructors</a></li>
                <li><a href="#">Schedule</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- メインビジュアル（ヒーローセクション） -->
    <section class="hero">
        <h1 class="hero-title">MIHATE<br>ACADEMY</h1>
        <p class="hero-subtitle">BOCAL & DANCE STUDIO IN NAGOYA</p>
        <a href="#" class="btn">クラスを見る</a>
    </section>

    <!-- ダンサー / クラス紹介セクション -->
    <section class="section">
        <h2 class="section-title">Featured Classes</h2>
        
        <div class="grid-container">
            <!-- アイテム 1 -->
            <div class="grid-item">
                <img src="kamihate.jpg" alt="Dance" class="grid-item-img">
                <div class="grid-item-content">
                    <span class="grid-item-tag">Choreography</span>
                    <h3 class="grid-item-title">Advanced HipHop<br>by Takuya</h3>
                </div>
            </div>

            <!-- アイテム 2 -->
            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1547153760-18fc86324498?q=80&w=600" alt="Dance" class="grid-item-img">
                <div class="grid-item-content">
                    <span class="grid-item-tag">Beginner</span>
                    <h3 class="grid-item-title">Basic Groove<br>by Minami</h3>
                </div>
            </div>

            <!-- アイテム 3 -->
            <div class="grid-item">
                <img src="https://images.unsplash.com/photo-1504609773096-104ff2c73ba4?q=80&w=600" alt="Dance" class="grid-item-img">
                <div class="grid-item-content">
                    <span class="grid-item-tag">K-POP</span>
                    <h3 class="grid-item-title">K-POP Cover<br>by Yuka</h3>
                </div>
            </div>
        </div>
    </section>

    <!-- フッター -->
    <footer>
        <p>&copy; 2026 MIHATE ACADEMY. All Rights Reserved.</p>
    </footer>

</body>
</html>
